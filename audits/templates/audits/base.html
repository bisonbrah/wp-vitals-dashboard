<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WP Vitals{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-950 text-gray-100 min-h-full font-mono">

<!-- Nav -->
<nav class="border-b border-gray-800 px-6 py-4">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
        <a href="{% url 'dashboard' %}"
           class="text-white font-semibold tracking-tight hover:text-green-400 transition-colors">
            wp-vitals <span class="text-green-400">dashboard</span>
        </a>
        <span class="text-gray-500 text-xs">local audit tool</span>
    </div>
</nav>

<!-- Content -->
<main class="max-w-5xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
</main>

</body>
</html>
